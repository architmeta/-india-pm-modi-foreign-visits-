name: India PM Domestic Visits Scraper

on:
  schedule:
    # Runs every 3 days at 06:00 UTC (11:30 AM IST)
    # Day 1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31 of every month
    - cron: '0 6 1,4,7,10,13,16,19,22,25,28,31 * *'
  workflow_dispatch:

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run domestic visits scraper (update mode)
        run: python domestic_scraper.py

      - name: Commit updated CSV to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: " domestic visits update"
          file_pattern: "pm_domestic_visits.csv"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
